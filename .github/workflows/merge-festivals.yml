name: Merge festivals

# Fügt alle Dateien aus dem Ordner festivals/ automatisch zu festivals.json zusammen.
# Datei-Pfad im Repo: .github/workflows/merge-festivals.yml

on:
  push:
    branches: [ main ]
    paths: [ 'festivals/**' ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  merge:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Einzeldateien zu festivals.json zusammenführen
        run: |
          jq -s '{version: 1, festivals: [.[]]}' festivals/*.json > festivals.json

      - name: festivals.json committen (nur bei Änderung)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add festivals.json
          git diff --staged --quiet || git commit -m "Auto-merge festivals.json"
          git push
